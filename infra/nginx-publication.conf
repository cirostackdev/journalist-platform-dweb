# Publication site — serves static articles via Tor hidden service
# Tor maps .onion:80 → 127.0.0.1:8080
# Symlink to /etc/nginx/sites-enabled/publication

server {
    listen 127.0.0.1:8080;
    server_name localhost;

    root /var/publication;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "DENY";
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'";

    access_log off;
    error_log /run/nginx-publication-error.log warn;

    server_tokens off;
}
